services:
  # ─── Nginx (Frontend + API Proxy) ─────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    ports:
      # Открываем наружу порт 80 (HTTP)
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  # ─── Backend (NestJS API) ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Важно: Замените на домен вашего сервера (например, http://my-cool-site.ru)
      - "FRONTEND_ORIGIN=*"
    # DNS Google — помогает обойти блокировку api.pwnedpasswords.com
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
